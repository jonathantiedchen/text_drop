<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Drop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 14px;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.5px;
  }

  .actions {
    display: flex;
    gap: 8px;
  }

  button {
    background: transparent;
    border: 1px solid #333;
    color: #888;
    font-family: inherit;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover {
    border-color: #555;
    color: #ccc;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #222;
    color: #aaa;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.2s ease;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #d4d4d4;
    font-family: inherit;
    font-size: 15px;
    line-height: 1.7;
    padding: 24px 20px;
    resize: none;
    width: 100%;
    caret-color: #888;
  }

  textarea::placeholder {
    color: #333;
  }

  @media (min-width: 700px) {
    textarea {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 0;
    }
  }
</style>
</head>
<body>

<header>
  <h1>TEXT DROP</h1>
  <div class="actions">
    <button onclick="copyAll()">Copy all</button>
    <button onclick="clearAll()">Clear</button>
  </div>
</header>

<textarea id="editor" placeholder="Start typing..." spellcheck="false" autofocus></textarea>

<div class="toast" id="toast"></div>

<script>
  const editor = document.getElementById('editor');
  const toast = document.getElementById('toast');

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  }

  function copyAll() {
    if (!editor.value) return;
    navigator.clipboard.writeText(editor.value).then(() => showToast('Copied'));
  }

  function clearAll() {
    editor.value = '';
    editor.focus();
  }

  // Tab key inserts a tab instead of moving focus
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '\t' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 1;
    }
  });
</script>
</body>
</html>
